<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>recipe book</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <nav>
            <h1>recipe Book </h1>

            <img src="./yg logo.png" class="img" alt="">
        </nav>

        <div class="main_container">

            <div class="container_one">
                <h1> chicken briyani</h1>

                <p>rice,chicken,onion,tomato,curd,herbs,Spices,ginger garlic paste</p>
                <p>
                    Wash rice, prepare masala with onion, spices, ginger-garlic, and cook it with
                    chicken/mutton/vegetables.
                    Add rice and water, cook together until the rice is fluffy and the biryani is ready 
                </p>
             <div class="delete_container">
                <button>delete</button>
             </div>
                
            </div>
            
        </div>
        

        <div class="overlay"> </div>
        <div class="popup_form">
            <h1>Add Recipe</h1>
            <form action=""> 
                <input type="text" placeholder="Dish Name" id="dish_name_input">
                <input type="text" placeholder="Ingredient" id="ingredient_input">
                <textarea name=""  placeholder="Cookings steps" id="cooking_step_textrea"></textarea>
                
                <div class="popup_form_buttons">
                    <button class="cancel_red_button" id="cancel_popup">Cancel</button>
                <button class="add_blue_button" id="add_popup">Add</button>
                
                </div>

            </form>

            

        </div>
        <div class="footer_button">
            <button>+</button>
        </div>
        <!-- <footer>
            <p>@Lorem ipsum dolor sit amet consectetur, adipisicing elit. </p>
        </footer> -->
    </main>
    <script src="./script.js"></script>
</body>

</html>
